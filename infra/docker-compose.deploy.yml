services:
  postgres:
    image: postgres:16
    container_name: oilgas-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oilgas}
      POSTGRES_USER: ${POSTGRES_USER:-oilgas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oilgas}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oilgas} -d ${POSTGRES_DB:-oilgas}"]
      interval: 5s
      timeout: 5s
      retries: 20

  bootstrap:
    build:
      context: ..
      dockerfile: Dockerfile.deploy
    container_name: oilgas-bootstrap
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RAW_DATA_DIR: /app/data/raw
      SILVER_DIR: /app/data/silver/telemetry
      GOLD_DIR: /app/data/gold
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-oilgas}
      POSTGRES_USER: ${POSTGRES_USER:-oilgas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oilgas}
      POSTGRES_TABLE: ${POSTGRES_TABLE:-kpis_by_asset_day}
      ASSET_COUNT: ${ASSET_COUNT:-5}
    command: ["python", "-m", "pipelines.batch.bootstrap_deploy"]
    volumes:
      - app_data:/app/data
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: Dockerfile.deploy
    container_name: oilgas-api
    depends_on:
      postgres:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-oilgas}
      POSTGRES_USER: ${POSTGRES_USER:-oilgas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oilgas}
      POSTGRES_TABLE: ${POSTGRES_TABLE:-kpis_by_asset_day}
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "4000"]
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4000/health', timeout=3)"
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  dashboard:
    build:
      context: ..
      dockerfile: Dockerfile.deploy
    container_name: oilgas-dashboard
    depends_on:
      api:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_BASE_URL: http://api:4000
      GOLD_DIR: /app/data/gold
      PYTHONPATH: /app
    command:
      [
        "streamlit",
        "run",
        "analytics/dashboard.py",
        "--server.address=0.0.0.0",
        "--server.port=8501"
      ]
    ports:
      - "8501:8501"
    volumes:
      - app_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8501', timeout=3)"
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  app_data:
